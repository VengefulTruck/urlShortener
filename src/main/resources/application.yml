spring:
  application:
    name: url-shortener

  datasource:
    url: jdbc:h2:mem:urlshortener;DB_CLOSE_DELAY=-1
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    cache-names: shortLinks
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=5m,recordStats

app:
  base-url: http://localhost:8080
  redirect-path: /r
  short-code-length: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

logging:
  level:
    org.hibernate.SQL: DEBUG